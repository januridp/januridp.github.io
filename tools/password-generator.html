<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
    <meta name="description" content="Secure Password Generator - SysAdmin Tool by Januri Prasetyo">
    <meta name="author" content="Januri Prasetyo">
    <link rel="icon" type="image/png" href="../profile-pic.png">
    <title>JanuriDP | Password Generator</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
    
    <style>
        .calc-container {
            max-width: 600px;
            width: 100%;
            margin: 2rem auto;
        }
        .password-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            word-break: break-all;
            position: relative;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 1rem;
        }
        .copy-btn:hover {
            background: rgba(0, 243, 255, 0.1);
        }
        .control-group {
            margin-bottom: 1.5rem;
        }
        .control-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .slider {
            width: 100%;
            height: 6px;
            background: var(--glass-border);
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--neon-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        .checkbox-container input {
            display: none;
        }
        .checkmark {
            width: 18px;
            height: 18px;
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            position: relative;
            background: var(--glass-bg);
        }
        .checkbox-container input:checked + .checkmark {
            background: var(--neon-cyan);
            border-color: var(--neon-cyan);
        }
        .checkbox-container input:checked + .checkmark::after {
            content: '✔';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: var(--bg-color);
        }
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: var(--neon-cyan);
        }
        @media (max-width: 768px) {
            .back-btn { position: static; margin-bottom: 2rem; }
            .checkbox-group { grid-template-columns: 1fr; }
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-cyan);
            color: var(--bg-color);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            display: none;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
    <script src="../js/header.js" defer></script>
    <script src="../js/footer.js" defer></script>
</head>
<body>

    <app-header></app-header>

    <section class="fade-in visible" style="padding-top: 8rem;">
        <a href="../index.html#tools" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> back to terminal
        </a>

        <div class="calc-container">
            <h1 class="mono" style="margin-bottom: 1rem; color: var(--neon-cyan);">./Pass_Gen</h1>
            <p class="hero-subtitle" style="margin-bottom: 2rem; margin-left: 0; text-align: left;">
                Generate cryptographically strong passwords for your servers and sensitive accounts.
            </p>

            <div class="glass-card">
                <div class="password-display">
                    <span id="password-output">Click Generate</span>
                    <button class="copy-btn" id="copy-btn" title="Copy to Clipboard">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <span>Password Length</span>
                        <span id="length-val" style="color: var(--neon-cyan)">16</span>
                    </div>
                    <input type="range" id="length-slider" class="slider" min="8" max="64" value="16">
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="include-uppercase" checked>
                        <div class="checkmark"></div>
                        Uppercase Letters
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="include-numbers" checked>
                        <div class="checkmark"></div>
                        Include Numbers
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="include-symbols" checked>
                        <div class="checkmark"></div>
                        Include Symbols
                    </label>
                </div>

                <div style="margin-top: 2.5rem; text-align: center;">
                    <button id="generate-btn" class="btn" style="width: 100%;">
                        <i class="fa-solid fa-rotate" style="margin-right: 8px;"></i> Re-Generate
                    </button>
                </div>
            </div>
        </div>
    </section>

    <div id="toast" class="toast">Copied to Clipboard!</div>

    <app-footer></app-footer>

    <script>
        const output = document.getElementById('password-output');
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        const btnGenerate = document.getElementById('generate-btn');
        const btnCopy = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        const checkboxes = {
            upper: document.getElementById('include-uppercase'),
            number: document.getElementById('include-numbers'),
            symbol: document.getElementById('include-symbols')
        };

        const charsets = {
            lower: "abcdefghijklmnopqrstuvwxyz",
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            number: "0123456789",
            symbol: "!@#$%^&*()_+~`|}{[]:;?><,./-="
        };

        function generatePassword() {
            let availableChars = charsets.lower;
            if (checkboxes.upper.checked) availableChars += charsets.upper;
            if (checkboxes.number.checked) availableChars += charsets.number;
            if (checkboxes.symbol.checked) availableChars += charsets.symbol;

            let password = "";
            const length = parseInt(lengthSlider.value);
            
            // Using crypto.getRandomValues for better security
            const array = new Uint32Array(length);
            window.crypto.getRandomValues(array);

            for (let i = 0; i < length; i++) {
                password += availableChars[array[i] % availableChars.length];
            }

            output.textContent = password;
        }

        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
            generatePassword();
        });

        [checkboxes.upper, checkboxes.number, checkboxes.symbol].forEach(el => {
            el.addEventListener('change', generatePassword);
        });

        btnGenerate.addEventListener('click', generatePassword);

        btnCopy.addEventListener('click', () => {
            const text = output.textContent;
            if (text === "Click Generate") return;
            
            navigator.clipboard.writeText(text).then(() => {
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        });

        // Initial generation
        generatePassword();
    </script>
</body>
</html>
