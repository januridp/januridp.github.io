<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
    <meta name="description" content="What is My IP - SysAdmin Tool by Januri Prasetyo">
    <meta name="author" content="Januri Prasetyo">
    <link rel="icon" type="image/png" href="../profile-pic.png">
    <title>JanuriDP | What is My IP</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .calc-container { max-width: 800px; width: 100%; margin: 2rem auto; }
        .ip-hero {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .ip-hero::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .ip-large {
            font-size: 3.5rem; font-weight: 800; font-family: 'Fira Code', monospace;
            color: var(--neon-cyan); margin-bottom: 0.5rem; word-break: break-all;
        }
        .detail-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem;
        }
        .detail-item {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 1.5rem; border-radius: 12px; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .detail-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .detail-value { font-family: 'Fira Code', monospace; color: var(--text-main); font-size: 1.1rem; }
        
        .back-btn {
            position: absolute; top: 2rem; left: 2rem; color: var(--text-muted);
            text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
        }
        .back-btn:hover { color: var(--neon-cyan); }
        @media (max-width: 768px) {
            .back-btn { position: static; margin-bottom: 2rem; }
            .ip-large { font-size: 2.2rem; }
        }
    </style>
    <script src="../js/header.js" defer></script>
    <script src="../js/footer.js" defer></script>
</head>
<body>

    <app-header></app-header>

    <section class="fade-in visible" style="padding-top: 8rem;">
        <a href="../index.html#tools" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> back to terminal
        </a>

        <div class="calc-container">
            <h1 class="mono" style="margin-bottom: 1rem; color: var(--neon-cyan);">./IP_Inspector</h1>
            <p class="hero-subtitle" style="margin-bottom: 2rem; margin-left: 0; text-align: left;">
                Detailed analysis of your current network endpoint and routing information.
            </p>

            <div class="ip-hero">
                <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <div class="detail-label">IPv4 Address</div>
                        <div id="ip-display" class="ip-large" style="font-size: 2.2rem;">Loading...</div>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <div class="detail-label">IPv6 Address</div>
                        <div id="ipv6-display" class="ip-large" style="font-size: 2.2rem;">Checking...</div>
                    </div>
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem" onclick="copyIP('ip-display')">Copy IPv4</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem" onclick="copyIP('ipv6-display')">Copy IPv6</button>
                </div>
            </div>

            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">Location</span>
                    <span id="loc-val" class="detail-value">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">ISP / ASN</span>
                    <span id="isp-val" class="detail-value">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Coordinates</span>
                    <span id="coord-val" class="detail-value">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Browser / OS</span>
                    <span id="ua-val" class="detail-value" style="font-size: 0.9rem;">-</span>
                </div>
            </div>

            <div style="margin-top: 3rem; text-align: center;">
                <button class="btn" onclick="fetchInfo()">
                    <i class="fa-solid fa-sync" style="margin-right: 8px;"></i> Refresh Node Info
                </button>
            </div>
        </div>
    </section>

    <app-footer></app-footer>

    <script>
        async function fetchInfo() {
            const ipDisplay = document.getElementById('ip-display');
            const ipv6Display = document.getElementById('ipv6-display');
            ipDisplay.textContent = 'Scanning...';
            ipv6Display.textContent = 'Checking...';
            
            try {
                // Fetch Main Info (usually IPv4 on most networks)
                const response = await fetch('https://api.ipstack.com/check?access_key=745f78a7cc0dc3c5b323e239b3e28547');
                const data = await response.json();
                
                ipDisplay.textContent = data.ip || 'Unknown';
                document.getElementById('loc-val').textContent = `${data.city || ''}, ${data.country_name || 'Unknown'}`;
                document.getElementById('isp-val').textContent = data.connection?.isp || 'Private Network';
                document.getElementById('coord-val').textContent = `${data.latitude}, ${data.longitude}`;
                
                // Fetch dedicated IPv6 or combined
                const ipv6Response = await fetch('https://api64.ipify.org?format=json');
                const ipv6Data = await ipv6Response.json();
                ipv6Display.textContent = ipv6Data.ip || 'Not detected';
                
                // User Agent parsing
                const ua = navigator.userAgent;
                const browser = ua.includes('Chrome') ? 'Chrome' : ua.includes('Firefox') ? 'Firefox' : 'Other';
                const os = ua.includes('Windows') ? 'Windows' : ua.includes('Mac') ? 'macOS' : 'Linux';
                document.getElementById('ua-val').textContent = `${browser} on ${os}`;
                
            } catch (error) {
                if (ipDisplay.textContent === 'Scanning...') ipDisplay.textContent = 'Error';
                if (ipv6Display.textContent === 'Checking...') ipv6Display.textContent = 'None';
            }
        }

        function copyIP(id) {
            const ip = document.getElementById(id).textContent;
            if(ip !== 'Loading...' && ip !== 'Error' && ip !== 'Checking...') {
                navigator.clipboard.writeText(ip);
                alert('IP Copied!');
            }
        }

        fetchInfo();
    </script>
</body>
</html>
